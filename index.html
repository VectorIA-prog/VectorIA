<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VectorIA</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>

<style>
body {
  background:#07070f;
  color:#e8e8f0;
  font-family:'DM Sans',sans-serif;
}
.hero{text-align:center;padding:60px}
h1{font-family:'Syne';font-size:48px;margin-bottom:20px}
.subtitle{color:#888;margin-bottom:40px}

.tabs-wrap{display:flex;justify-content:center;gap:10px}
.tab-btn{padding:10px 20px;border:none;cursor:pointer;background:#111;color:#aaa}
.tab-btn.active{background:#fff;color:#000}

.section{display:none}
.section.active{display:block}

.modules-grid,.plans-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  padding:40px;
}

.module-card,.plan-card{
  background:#111;
  padding:20px;
  border-radius:10px;
  cursor:pointer;
}

.module-features{display:none}
.module-card.open .module-features{display:block}

.plan-cta{margin-top:15px;padding:10px;width:100%;cursor:pointer}
</style>
</head>

<body>

<div class="hero">
  <h1>VectorIA</h1>
  <p class="subtitle">Automatizá tu empresa con IA</p>

  <div class="tabs-wrap">
    <button class="tab-btn active" onclick="switchTab('modulos', this)">Módulos</button>
    <button class="tab-btn" onclick="switchTab('planes', this)">Planes</button>
  </div>
</div>

<div id="tab-modulos" class="section active">
  <div id="modules-grid" class="modules-grid"></div>
</div>

<div id="tab-planes" class="section">
  <div id="plans-grid" class="plans-grid"></div>
</div>

<script>
// ---------------- MÓDULOS ----------------
const modules = [
  {
    icon:"⏱",
    name:"Turnos Inteligentes",
    desc:"Automatiza reservas",
    features:["Recordatorios","Lista de espera","Reportes"]
  },
  {
    icon:"🛒",
    name:"Ecommerce",
    desc:"Tienda automatizada",
    features:["Pagos","Stock","Carrito"]
  }
];

// ---------------- PLANES (ARREGLADO) ----------------
const plans = [
  {
    name:"Prueba Gratis",
    price:"$0",
    period:"/14 días",
    desc:"Acceso completo",
    cta:"Probar"
  },
  {
    name:"Starter",
    price:"$89",
    period:"/mes",
    desc:"Para empezar",
    cta:"Comprar"
  },
  {
    name:"Growth",
    price:"$199",
    period:"/mes",
    desc:"Para crecer",
    cta:"Comprar"
  },
  {
    name:"Pro",
    price:"$399",
    period:"/mes",
    desc:"Empresas",
    cta:"Contactar"
  }
];

// ---------------- RENDER MÓDULOS ----------------
const mgrid = document.getElementById("modules-grid");

modules.forEach(m=>{
  const div=document.createElement("div");
  div.className="module-card";

  div.innerHTML=`
    <h3>${m.icon} ${m.name}</h3>
    <p>${m.desc}</p>
    <ul class="module-features">
      ${m.features.map(f=>`<li>${f}</li>`).join("")}
    </ul>
  `;

  div.onclick=()=>div.classList.toggle("open");
  mgrid.appendChild(div);
});

// ---------------- RENDER PLANES ----------------
const pgrid = document.getElementById("plans-grid");

plans.forEach(p=>{
  const div=document.createElement("div");
  div.className="plan-card";

  div.innerHTML=`
    <h3>${p.name}</h3>
    <h2>${p.price} <small>${p.period}</small></h2>
    <p>${p.desc}</p>
    <button class="plan-cta">${p.cta}</button>
  `;

  pgrid.appendChild(div);
});

// ---------------- TABS ----------------
function switchTab(id, btn){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));

  document.getElementById("tab-"+id).classList.add("active");
  btn.classList.add("active");
}
</script>

</body>
</html>
